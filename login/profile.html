<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Account Profile - Coffee Haven</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body{ font-family:Montserrat, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; background:#fffaf6; color:#3b2f2f; }
        .profile-container{ max-width:900px; margin:36px auto; padding:20px; background:linear-gradient(180deg,#fff,#fff7f0); border-radius:12px; box-shadow:0 12px 36px rgba(11,9,6,0.06); }
        .profile-header{ display:flex; align-items:center; gap:16px; }
        .avatar{ width:84px; height:84px; border-radius:14px; background:linear-gradient(135deg,#8b5a36,#cfa67f); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:24px; }
        .profile-actions{ margin-left:auto; display:flex; gap:8px; }
        .btn{ padding:8px 12px; border-radius:8px; background:linear-gradient(90deg,#6b3e26,#8b5a36); color:#fff; border:0; cursor:pointer; font-weight:800; }
        .profile-form{ margin-top:18px; display:grid; gap:10px; }
        label{ font-weight:700; font-size:13px; }
        input[type="text"], input[type="email"]{ padding:8px 10px; border-radius:8px; border:1px solid rgba(0,0,0,0.06); }
        .orders{ margin-top:18px; }
        .order{ background:#fff; border-radius:8px; padding:12px; box-shadow:0 8px 20px rgba(15,23,42,0.03); margin-bottom:10px; }
        .muted{ color:#6b5546; font-size:13px; }
        /* Return to shop icon */
        .return-shop-icon{ display:inline-flex; align-items:center; justify-content:center; width:44px; height:44px; border-radius:999px; background: linear-gradient(135deg,#ffd89b,#cfa67f); color:#3b2f2f; text-decoration:none; box-shadow:0 10px 30px rgba(203,128,53,0.18); border:none; transition:transform .18s ease, box-shadow .18s ease; }
        .return-shop-icon i{ font-size:18px; }
        .return-shop-icon:hover{ transform:translateY(-4px) scale(1.04); box-shadow:0 20px 40px rgba(203,128,53,0.24); }
    </style>
</head>
<body>
    <main class="profile-container">
        <div class="profile-header">
            <div class="avatar" id="pf-avatar">GH</div>
            <div>
                <h2 id="pf-name">Guest</h2>
                <div class="muted" id="pf-email">Not provided</div>
                <div class="muted" id="pf-address">Not provided</div>
            </div>
            <div class="profile-actions">
                <a href="/coffee_haven/my.html" id="pf-return" class="return-shop-icon" title="Return to Shop" aria-label="Return to Shop">
                    <i class="fa-solid fa-bag-shopping" aria-hidden="true"></i>
                </a>
                <button id="pf-logout" class="btn">Log out</button>
            </div>
        </div>

        <form id="pf-form" class="profile-form" onsubmit="return false;">
            <div>
                <label for="name">Full name</label>
                <input id="name" type="text" placeholder="Your name">
            </div>
            <div>
                <label for="email">Email</label>
                <input id="email" type="email" placeholder="you@example.com">
            </div>
            <div>
                <label for="address">Address</label>
                <input id="address" type="text" placeholder="Your address, city, postal code">
            </div>
            <div>
                <button id="pf-save" type="button" class="btn">Save profile</button>
            </div>
        </form>

        <!-- Recent Orders removed per request -->
        <!-- single return-to-shop icon is in header now -->
    </main>

    <script>
        function getCurrentUser(){
            try{ return JSON.parse(localStorage.getItem('coffeeHavenCurrentUser')||'null'); }catch(e){return null}
        }
        function setCurrentUser(u){ localStorage.setItem('coffeeHavenCurrentUser', JSON.stringify(u||null)); }
        function getUsers(){ try{ return JSON.parse(localStorage.getItem('coffeeHavenUsers')||'[]'); }catch(e){return[]} }

        function render(){
            const user = getCurrentUser();
            const nameEl = document.getElementById('pf-name');
            const emailEl = document.getElementById('pf-email');
            const avatar = document.getElementById('pf-avatar');
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
                const addressEl = document.getElementById('pf-address');
                const addressInput = document.getElementById('address');

            if(user){
                nameEl.textContent = user.name || 'Guest';
                emailEl.textContent = user.email || 'Not provided';
                addressEl.textContent = user.address || 'Not provided';
                avatar.textContent = (user.name||'G').split(' ').map(s=>s[0]).slice(0,2).join('').toUpperCase();
                nameInput.value = user.name || '';
                emailInput.value = user.email || '';
                addressInput.value = user.address || '';
            } else {
                nameEl.textContent = 'Guest';
                emailEl.textContent = 'Not provided';
                avatar.textContent = 'GH';
            }
        }

        document.getElementById('pf-save').addEventListener('click', (ev)=>{
            try{ ev && ev.preventDefault(); }catch(e){}
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const address = document.getElementById('address').value.trim();
            const user = getCurrentUser() || { id: 'guest-'+Date.now() };
            user.name = name || user.name || 'Guest';
            user.email = email || user.email || '';
            user.address = address || user.address || '';
            // persist current user
            setCurrentUser(user);
            // also update the users list so other parts of the app that read `coffeeHavenUsers` see the change
            try{
                const users = getUsers() || [];
                const idx = users.findIndex(u => (u.email && u.email === user.email) || (u.id && user.id && u.id === user.id));
                if(idx >= 0){ users[idx] = Object.assign({}, users[idx], user); }
                else { users.push(user); }
                localStorage.setItem('coffeeHavenUsers', JSON.stringify(users));
            }catch(e){ console.warn('Failed updating coffeeHavenUsers', e); }
            render();
            alert('Profile saved');
        });

        document.getElementById('pf-logout').addEventListener('click', ()=>{
            localStorage.removeItem('coffeeHavenCurrentUser');
            // redirect to login page
            window.location.href = '/coffee_haven/login/login.html';
        });

        // When returning to shop, persist any changes in the form first so address isn't lost
        (function persistOnReturn(){
            const ret = document.getElementById('pf-return');
            if(!ret) return;
            ret.addEventListener('click', function(ev){
                try{
                    ev.preventDefault();
                    // gather current form values and persist them
                    const name = document.getElementById('name').value.trim();
                    const email = document.getElementById('email').value.trim();
                    const address = document.getElementById('address').value.trim();
                    const user = getCurrentUser() || { id: 'guest-'+Date.now() };
                    user.name = name || user.name || 'Guest';
                    user.email = email || user.email || '';
                    user.address = address || user.address || '';
                    setCurrentUser(user);
                    try{
                        const users = getUsers() || [];
                        const idx = users.findIndex(u => (u.email && u.email === user.email) || (u.id && user.id && u.id === user.id));
                        if(idx >= 0) users[idx] = Object.assign({}, users[idx], user);
                        else users.push(user);
                        localStorage.setItem('coffeeHavenUsers', JSON.stringify(users));
                    }catch(e){ console.warn('Failed updating coffeeHavenUsers on return', e); }
                }catch(e){ console.error('persistOnReturn', e); }
                // navigate to the link target after saving
                try{ window.location.href = this.getAttribute('href') || '/coffee_haven/my.html'; }catch(e){ window.location.href = '/coffee_haven/my.html'; }
            });
        })();

        render();
    </script>
</body>
</html>
