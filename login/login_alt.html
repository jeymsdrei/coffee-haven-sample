<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Coffee Haven — Sign in</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
      :root{ --bg:#f6f2ef; --card:#ffffff; --accent:#6b3e26; --accent-2:#cfa67f; --muted:#6b5a4a; }
      *{box-sizing:border-box}
      html,body{height:100%;margin:0;font-family:Inter,system-ui,Arial;background:linear-gradient(180deg,#fffaf6,#f7f3ef)}

      .stage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px}
      .card{width:100%;max-width:920px;border-radius:14px;display:grid;grid-template-columns:1fr 420px;overflow:hidden;box-shadow:0 18px 48px rgba(11,9,6,0.08)}

      /* Left decorative area */
      .left{position:relative;background-image:url('../PICTURES/Screenshot 2025-11-04 002254.png');background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;padding:36px}
      .left .panel{position:relative;z-index:2;color:#fff;max-width:460px}
      .left::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg, rgba(107,62,38,0.28), rgba(12,9,6,0.42));}
      .left h1{font-family:'Playfair Display',serif;font-size:36px;margin:0 0 8px}
      .left p{margin:0;color:rgba(255,255,255,0.92)}

      /* Right form area */
      .right{background:var(--card);padding:28px;display:flex;flex-direction:column;gap:14px}
      .logo{display:flex;align-items:center;gap:12px}
      .logo img{width:44px;height:44px;border-radius:8px;object-fit:cover}
      .logo h2{margin:0;font-size:18px;color:var(--accent)}

      .form{margin-top:6px;display:flex;flex-direction:column;gap:12px}
      .field{position:relative}
      .field input{width:100%;padding:12px 40px 12px 12px;border-radius:10px;border:1px solid #eee;font-size:15px}
      .field .icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}
      label.small{font-size:13px;color:var(--muted);margin-bottom:6px;display:block}

      .actions{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
      .btn{padding:12px 16px;border-radius:10px;border:0;cursor:pointer;font-weight:700}
      .btn.primary{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:#fff;box-shadow:0 10px 30px rgba(107,62,38,0.12)}
      .btn.ghost{background:transparent;border:1px solid #eee;color:var(--accent)}

      .small-row{display:flex;align-items:center;gap:10px}
      .muted{color:var(--muted);font-size:13px}

      .divider{height:1px;background:#f1efe9;border-radius:6px;margin:6px 0}

      .oauth{display:flex;gap:8px}
      .oauth button{flex:1;padding:10px;border-radius:8px;border:1px solid #eee;background:#fff}

      /* subtle input focus */
      input:focus{outline:none;border-color:rgba(107,62,38,0.12);box-shadow:0 6px 20px rgba(107,62,38,0.06)}

      /* responsive */
      @media (max-width:880px){.card{grid-template-columns:1fr;}.left{height:200px}.right{padding:20px}}
    </style>
  </head>
  <body>
    <main class="stage">
      <section class="card" role="main">
        <div class="left" aria-hidden="false">
          <div class="panel">
            <h1>Wake up to better coffee</h1>
            <p>Sign in to explore exclusive blends, members-only offers, and easy reorder.</p>
          </div>
        </div>

        <aside class="right" aria-labelledby="signin-title">
          <div class="logo">
            <img src="../PICTURES/Screenshot 2025-11-04 002254.png" alt="Coffee Haven">
            <h2 id="signin-title">Sign in to Coffee Haven</h2>
          </div>

          <form class="form" action="login.php" method="post" novalidate>
            <div>
              <label class="small" for="email">Email</label>
              <div class="field">
                <input id="email" name="email" type="email" required autocomplete="email" placeholder="you@domain.com">
                <span class="icon">✉️</span>
              </div>
            </div>

            <div>
              <label class="small" for="password">Password</label>
              <div class="field">
                <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="••••••••">
                <button type="button" id="togglePwd" class="icon" aria-label="Show password" style="background:none;border:0;padding:0;">👁️</button>
              </div>
            </div>

            <div class="actions">
              <label class="small"><input type="checkbox" name="remember"> Remember</label>
              <a class="muted" href="#">Forgot?</a>
            </div>

            <div style="display:flex;gap:10px">
              <button class="btn primary" type="submit">Sign in</button>
              <button class="btn ghost" type="button" onclick="location.href='register.php'">Create</button>
            </div>

            <div class="divider"></div>

            <div style="display:flex;align-items:center;justify-content:space-between">
              <div class="muted">Or continue with</div>
              <div class="oauth">
                <button type="button" aria-label="Continue with Google">G</button>
                <button type="button" aria-label="Continue with Facebook">F</button>
              </div>
            </div>
          </form>
        </aside>
      </section>
    </main>

    <script>
      // Show/hide password
      (function(){
        const pwd = document.getElementById('password');
        const btn = document.getElementById('togglePwd');
        if(!pwd || !btn) return;
        btn.addEventListener('click', ()=>{
          const type = pwd.type === 'password' ? 'text' : 'password';
          pwd.type = type;
          btn.textContent = type === 'text' ? '🙈' : '👁️';
        });
      })();
    </script>
  </body>
</html>
